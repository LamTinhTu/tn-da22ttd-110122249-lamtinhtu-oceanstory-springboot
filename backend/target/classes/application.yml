spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ocean_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    # 32+ ky tu de dam bao do manh cua khoa HMAC
    secret: MySuperSecretJwtKeyForOceanStoryPlatform2026
    expiration-ms: 86400000
  google:
    # Google OAuth Client ID (Web client)
    client-id: ${GOOGLE_CLIENT_ID:985689735368-ibsnf0qnpkovc5ifjev25ei9uhfmk2nc.apps.googleusercontent.com}
    # Client secret chi dung cho Authorization Code flow (khong dung o frontend)
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  upload-dir: uploads
