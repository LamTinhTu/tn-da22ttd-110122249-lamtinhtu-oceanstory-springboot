spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    # 32+ ky tu de dam bao do manh cua khoa HMAC
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    # Google OAuth Client ID (Web client)
    client-id: ${GOOGLE_CLIENT_ID}
    # Client secret chi dung cho Authorization Code flow (khong dung o frontend)
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  upload-dir: ${UPLOAD_DIR:uploads}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:false}
    reset-password: ${BOOTSTRAP_RESET_PASSWORD:false}
    admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    moderator:
      username: ${BOOTSTRAP_MODERATOR_USERNAME:}
      email: ${BOOTSTRAP_MODERATOR_EMAIL:}
      password: ${BOOTSTRAP_MODERATOR_PASSWORD:}
